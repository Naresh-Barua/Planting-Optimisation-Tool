<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="900"
  height="200"
  viewBox="0 0 900 200"
  xmlns="http://www.w3.org/2000/svg">

  <style>
    .frame { fill:#ffffff; stroke:#3b5663; stroke-width:8; }
    .divider { stroke:#3b5663; stroke-width:6; }
  </style>

  <!-- Outer frame -->
  <rect x="50" y="60" rx="20" ry="20" width="800" height="80" class="frame"/>

  <!-- Color bands -->
  <g clip-path="url(#clip)">
    <rect x="50"  y="60" width="80" height="80" fill="#c4473d"/>
    <rect x="130" y="60" width="80" height="80" fill="#e07b3c"/>
    <rect x="210" y="60" width="80" height="80" fill="#e3b04b"/>
    <rect x="290" y="60" width="80" height="80" fill="#d6d04f"/>
    <rect x="370" y="60" width="80" height="80" fill="#9bbf5a"/>
    <rect x="450" y="60" width="80" height="80" fill="#6ea36a"/>
    <rect x="530" y="60" width="80" height="80" fill="#5b9aa0"/>
    <rect x="610" y="60" width="80" height="80" fill="#4f7fa2"/>
    <rect x="690" y="60" width="80" height="80" fill="#5c6fae"/>
    <rect x="770" y="60" width="80" height="80" fill="#6b5fa6"/>
  </g>

  <!-- Neutral marker (pH 7) -->
  <line x1="450" y1="45" x2="450" y2="155" class="divider"/>

  <!-- Clip path -->
  <defs>
    <clipPath id="clip">
      <rect x="50" y="60" rx="20" ry="20" width="800" height="80"/>
    </clipPath>
  </defs>

</svg>