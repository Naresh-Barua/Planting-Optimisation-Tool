<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Glass body gradient -->
    <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef5f7"/>
      <stop offset="100%" stop-color="#c7d7dd"/>
    </linearGradient>

    <!-- Temperature column gradient -->
    <linearGradient id="tempGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f36a3d"/>
      <stop offset="50%" stop-color="#e64a3c"/>
      <stop offset="100%" stop-color="#4fa3c7"/>
    </linearGradient>

    <!-- Bulb gradient -->
    <radialGradient id="bulbGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#7fc6e3"/>
      <stop offset="100%" stop-color="#2e6f95"/>
    </radialGradient>
  </defs>

  <!-- Outer thermometer -->
  <path
    d="
      M256 40
      C220 40, 200 65, 200 95
      L200 310
      C170 330, 150 360, 150 395
      C150 440, 200 480, 256 480
      C312 480, 362 440, 362 395
      C362 360, 342 330, 312 310
      L312 95
      C312 65, 292 40, 256 40
      Z"
    fill="url(#glassGrad)"
    stroke="#3b5663"
    stroke-width="14"
    stroke-linejoin="round"/>

  <!-- Temperature column -->
  <rect
    x="236"
    y="100"
    width="40"
    height="210"
    rx="20"
    fill="url(#tempGrad)"/>

  <!-- Tick marks -->
  <g stroke="#3b5663" stroke-width="6">
    <line x1="290" y1="120" x2="310" y2="120"/>
    <line x1="290" y1="150" x2="310" y2="150"/>
    <line x1="290" y1="180" x2="310" y2="180"/>
    <line x1="290" y1="210" x2="310" y2="210"/>
    <line x1="290" y1="240" x2="310" y2="240"/>
    <line x1="290" y1="270" x2="310" y2="270"/>
  </g>

  <!-- Bulb -->
  <circle
    cx="256"
    cy="395"
    r="60"
    fill="url(#bulbGrad)"
    stroke="#3b5663"
    stroke-width="12"/>

  <!-- Highlight -->
  <circle
    cx="235"
    cy="370"
    r="12"
    fill="#e8f6fb"
    opacity="0.8"/>

</svg>